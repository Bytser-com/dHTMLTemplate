apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: example

resources:
  - namespace.yaml
  - web-deployment.yaml
  - web-configmap.yaml
  - web-service.yaml
  - web-hpa.yaml
  - web-pdb.yaml


labels:
  - pairs:
      app.kubernetes.io/name: example
      app.kubernetes.io/part-of: example


images:
  - name: example-web
    newName: registry/example-web
    newTag: "0.0.1"
