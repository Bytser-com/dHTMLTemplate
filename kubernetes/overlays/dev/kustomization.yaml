apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: example-web
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/containers/imagePullPolicy
        value: Always

  - target:
      kind: ConfigMap
      name: example-web-config
    patch: |-
      - op: replace
        path: /data/API_URL
        value: "https://dev-api.example.com"
      - op: replace
        path: /data/DEF_LANG
        value: "en-US"

  - target:
      kind: HorizontalPodAutoscaler
      name: example-web-hpa
    patch: |-
      - op: replace
          path: /spec/minReplicas
          value: 1
      - op: replace
          path: /spec/maxReplicas
          value: 3
